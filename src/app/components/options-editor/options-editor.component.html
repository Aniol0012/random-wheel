<section class="options-editor">
  <div class="option-list" role="list">
    @for (option of options(); track trackById($index, option)) {
      <div class="option-item" role="listitem">
        <input
          #colorInput
          class="sr-only"
          type="color"
          [value]="option.color"
          [attr.aria-label]="colorLabel() + ': ' + option.label"
          (input)="updateColor.emit({ id: option.id, color: colorInput.value })" />

        <button
          class="color-button"
          type="button"
          [style.background]="option.color"
          [attr.aria-label]="colorLabel() + ': ' + option.label"
          (click)="colorInput.click()"></button>

        <label class="sr-only" [attr.for]="'option-' + option.id">
          {{ option.label }}
        </label>
        <input
          #optionInput
          class="option-name"
          [id]="'option-' + option.id"
          [value]="option.label"
          (input)="updateLabel.emit({ id: option.id, label: optionInput.value })"
          (keydown)="onOptionKeydown($event, optionInput.value)" />

        <button
          class="delete-button"
          type="button"
          [attr.aria-label]="deleteLabel() + ': ' + option.label"
          (click)="removeOption.emit(option.id)">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M15.5 3.75h-7a1.75 1.75 0 0 0-1.74 1.57l-.14 1.43H4.75a.75.75 0 0 0 0 1.5h.73l.69 9.69A2.25 2.25 0 0 0 8.42 20h7.16a2.25 2.25 0 0 0 2.25-2.06l.69-9.69h.73a.75.75 0 0 0 0-1.5h-1.87l-.14-1.43a1.75 1.75 0 0 0-1.74-1.57Zm-5.9 3 .11-1.06a.25.25 0 0 1 .25-.19h3.08a.25.25 0 0 1 .25.19l.11 1.06H9.6Zm-.36 3.15a.75.75 0 0 1 .75.75v5.8a.75.75 0 0 1-1.5 0v-5.8a.75.75 0 0 1 .75-.75Zm5.52 0a.75.75 0 0 1 .75.75v5.8a.75.75 0 0 1-1.5 0v-5.8a.75.75 0 0 1 .75-.75Z" />
          </svg>
        </button>
      </div>
    }

    <div class="option-item option-item-draft" role="listitem">
      <span class="draft-badge" aria-hidden="true">+</span>
      <input
        #draftInput
        class="text-input option-name"
        type="text"
        [value]="draft()"
        [placeholder]="placeholder()"
        (input)="onDraftInput(draftInput.value)"
        (keydown)="onKeydown($event)" />
      <button class="add-button" type="button" [disabled]="!draft().trim()" (click)="submit()">
        {{ addButtonLabel() }}
      </button>
    </div>
  </div>
</section>
