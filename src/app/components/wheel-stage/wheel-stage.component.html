<section class="wheel-section">
  <div class="wheel-copy" aria-live="polite">
    @if (resultText()) {
      <p class="wheel-result">{{ resultText() }}</p>
    }
    @if (statusText()) {
      <p class="wheel-status">{{ statusText() }}</p>
    }
  </div>

  <div class="wheel-frame">
    <div class="confetti-layer" aria-hidden="true">
      @for (piece of confettiPieces(); track piece.id) {
        <span
          class="confetti-piece"
          [style.--confetti-color]="piece.color"
          [style.--confetti-left]="piece.left"
          [style.--confetti-size]="piece.size"
          [style.--confetti-delay]="piece.delay"
          [style.--confetti-duration]="piece.duration"
          [style.--confetti-drift]="piece.drift"
          [style.--confetti-rotation]="piece.rotation"
        ></span>
      }
    </div>

    <div class="pointer" aria-hidden="true"></div>

    <div
      class="wheel-touch-area"
      [class.is-disabled]="!canSpin()"
      [class.is-spinning]="isSpinning()"
      [attr.role]="'button'"
      [attr.tabindex]="0"
      [attr.aria-disabled]="!canSpin()"
      [attr.aria-label]="wheelAriaLabel()"
      (click)="requestSpin()"
      (keydown)="onWheelKeydown($event)"
    >
      @if (slices().length > 0) {
        <svg
          class="wheel-svg"
          viewBox="0 0 200 200"
          [style.transform]="'rotate(' + rotation() + 'deg)'"
          [style.transition-duration]="durationSeconds() + 's'"
        >
          @for (slice of slices(); track slice.id) {
            <path
              [attr.d]="slice.path"
              [attr.fill]="slice.color"
              stroke="rgba(255,255,255,0.88)"
              stroke-width="1.6"
            />
          }

          @for (slice of slices(); track slice.id) {
            <text
              class="wheel-label"
              [attr.x]="slice.labelX"
              [attr.y]="slice.labelY"
              [attr.transform]="'rotate(' + slice.labelRotation + ' ' + slice.labelX + ' ' + slice.labelY + ')'"
            >
              {{ slice.label }}
            </text>
          }

          <circle cx="100" cy="100" r="18" fill="#f6f5ef" />
          <circle cx="100" cy="100" r="8" fill="#364241" />
        </svg>
      } @else {
        <div class="wheel-empty">{{ emptyLabel() }}</div>
      }
    </div>

    <button
      class="fullscreen-button"
      type="button"
      [attr.aria-label]="fullscreenLabel()"
      [class.is-active]="isFullscreen()"
      (click)="requestFullscreen($event)"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M7 3H4a1 1 0 0 0-1 1v3h2V5h2V3Zm14 1a1 1 0 0 0-1-1h-3v2h2v2h2V4ZM5 17H3v3a1 1 0 0 0 1 1h3v-2H5v-2Zm16 0h-2v2h-2v2h3a1 1 0 0 0 1-1v-3Z"
        />
      </svg>
    </button>
  </div>

  @if (!isFullscreen()) {
    <button
      class="spin-button"
      type="button"
      [disabled]="!canSpin()"
      (click)="requestSpin()"
    >
      {{ isSpinning() ? spinningLabel() : spinLabel() }}
    </button>
  }
</section>
