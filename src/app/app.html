<main
  class="app-shell"
  [class.is-fullscreen]="isFullscreen()"
  [class.theme-dark]="theme() === 'dark'"
  [class.theme-light]="theme() === 'light'">
  <header class="page-header">
    <div class="brand-copy">
      <h1>{{ texts().appName }}</h1>
    </div>

    <div class="header-actions">
      <button
        class="theme-button"
        type="button"
        [attr.aria-pressed]="theme() === 'dark'"
        [attr.aria-label]="theme() === 'dark' ? texts().themeLightLabel : texts().themeDarkLabel"
        (click)="toggleTheme()">
        @if (theme() === 'dark') {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <rect x="11.25" y="1.75" width="1.5" height="3" rx="0.75" />
            <rect x="11.25" y="19.25" width="1.5" height="3" rx="0.75" />
            <rect x="19.25" y="11.25" width="3" height="1.5" rx="0.75" />
            <rect x="1.75" y="11.25" width="3" height="1.5" rx="0.75" />
            <rect x="17.58" y="4.92" width="1.5" height="3" rx="0.75" transform="rotate(45 18.33 6.42)" />
            <rect x="17.58" y="16.08" width="1.5" height="3" rx="0.75" transform="rotate(135 18.33 17.58)" />
            <rect x="4.92" y="16.08" width="1.5" height="3" rx="0.75" transform="rotate(225 5.67 17.58)" />
            <rect x="4.92" y="4.92" width="1.5" height="3" rx="0.75" transform="rotate(315 5.67 6.42)" />
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M14.78 2.69a.75.75 0 0 0-.86.98 8.49 8.49 0 0 1-10.25 11.5.75.75 0 0 0-.98.86 10 10 0 1 0 12.09-13.34Z" />
          </svg>
        }
      </button>

      <nav class="language-switcher" [attr.aria-label]="texts().languageLabel">
        @for (languageOption of ['ca', 'es', 'en']; track trackLanguage($index, languageOption)) {
          <button
            class="language-button"
            type="button"
            [class.is-active]="language() === languageOption"
            [attr.aria-pressed]="language() === languageOption"
            (click)="setLanguage(languageOption)">
            {{ languageOption.toUpperCase() }}
          </button>
        }
      </nav>
      <a
        class="icon-link"
        href="https://github.com/Aniol0012/random-wheel"
        target="_blank"
        rel="noopener"
        [attr.aria-label]="texts().footerProject">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M12 2C6.48 2 2 6.58 2 12.23c0 4.52 2.87 8.36 6.84 9.71.5.1.68-.22.68-.49 0-.24-.01-1.05-.01-1.91-2.78.62-3.37-1.2-3.37-1.2-.46-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .08 1.53 1.06 1.53 1.06.9 1.58 2.35 1.12 2.92.86.09-.67.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.09 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.31.1-2.73 0 0 .84-.28 2.75 1.05A9.31 9.31 0 0 1 12 6.84c.85 0 1.71.12 2.5.35 1.9-1.33 2.74-1.05 2.74-1.05.56 1.42.21 2.47.1 2.73.64.72 1.03 1.63 1.03 2.75 0 3.96-2.34 4.82-4.57 5.08.36.32.68.96.68 1.94 0 1.4-.01 2.54-.01 2.89 0 .27.18.59.69.49A10.27 10.27 0 0 0 22 12.23C22 6.58 17.52 2 12 2Z" />
        </svg>
      </a>
    </div>
  </header>

  <section class="studio">
    <div class="wheel-column">
      <app-wheel-stage
        [options]="options()"
        [rotation]="rotation()"
        [durationSeconds]="settings().spinDurationSeconds"
        [canSpin]="canSpin()"
        [isSpinning]="isSpinning()"
        [spinLabel]="texts().spin"
        [spinningLabel]="texts().spinning"
        [emptyLabel]="texts().wheelEmpty"
        [wheelAriaLabel]="texts().wheelAriaLabel"
        [resultText]="resultLabel()"
        [statusText]="statusMessage()"
        [isFullscreen]="isFullscreen()"
        [fullscreenLabel]="isFullscreen() ? texts().fullscreenExit : texts().fullscreenEnter"
        [confettiPieces]="confettiPieces()"
        (spinRequested)="spinWheel()"
        (fullscreenRequested)="toggleFullscreen()" />
    </div>

    <div class="tools-column">
      <section class="section-block">
        <div class="section-heading">
          <h2>{{ texts().optionsTitle }}</h2>
        </div>

        <div class="setting-group setting-group-inline">
          <label class="setting-label" for="spin-duration">
            <span>{{ texts().durationLabel }}</span>
            <strong>{{ settings().spinDurationSeconds }}s</strong>
          </label>
          <input
            id="spin-duration"
            #durationInput
            class="range-input"
            type="range"
            min="1"
            max="10"
            step="1"
            [value]="settings().spinDurationSeconds"
            (input)="updateDuration(durationInput.value)" />
        </div>

        <div class="options-summary">{{ optionCountLabel() }}</div>

        <app-options-editor
          [options]="options()"
          [placeholder]="texts().newOptionPlaceholder"
          [addButtonLabel]="texts().addOption"
          [colorLabel]="texts().colorLabel"
          [deleteLabel]="texts().deleteLabel"
          [emptyLabel]="texts().emptyList"
          (addOption)="addOption($event)"
          (updateLabel)="updateOptionLabel($event)"
          (updateColor)="updateOptionColor($event)"
          (removeOption)="removeOption($event)" />

        <div class="action-row">
          <button class="secondary-button shuffle" type="button" (click)="shuffleOptions()">
            {{ texts().shuffle }}
          </button>
          <button class="secondary-button danger" type="button" (click)="clearOptions()">
            {{ texts().clear }}
          </button>
        </div>
      </section>

      <section class="advanced-block">
        <div class="section-heading">
          <h2>{{ texts().advancedTitle }}</h2>
        </div>

        <label class="toggle-row">
          <input
            #removeWinnerInput
            type="checkbox"
            [checked]="settings().removeWinner"
            (change)="setRemoveWinner(removeWinnerInput.checked)" />
          <span>{{ texts().removeWinner }}</span>
        </label>

        <label class="toggle-row">
          <input
            #showConfettiInput
            type="checkbox"
            [checked]="settings().showConfetti"
            (change)="setShowConfetti(showConfettiInput.checked)" />
          <span>{{ texts().confettiLabel }}</span>
        </label>

        <p class="advanced-note">{{ texts().cleanupHint }}</p>
      </section>
    </div>
  </section>
</main>
